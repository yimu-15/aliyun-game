# =============================================================================
# 世界杯冠军预测 Agent — docker-compose.yml
# =============================================================================
# 启动:
#   docker-compose up -d              # 后台启动全部服务
#   docker-compose up -d streamlit    # 仅启动前端
#   docker-compose logs -f            # 查看日志
#   docker-compose down               # 停止并清理
# =============================================================================

version: "3.8"

services:
  # ── Streamlit 前端 ──
  streamlit:
    build: .
    container_name: wc-streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data                    # 数据持久化
      - ./config:/app/config:ro             # 配置只读
    environment:
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_HEADLESS=true
      - MONTE_CARLO_SIMULATIONS=5000        # 云端降低模拟次数
      - RANDOM_SEED=42
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── FastAPI 后端 (可选，MVP 可注释掉) ──
  backend:
    build: .
    container_name: wc-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - LOG_LEVEL=INFO
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # MVP 阶段后端可选, 取消注释以启用:
    # profiles:
    #   - full

# ── 数据卷 ──
volumes:
  wc-data:
    driver: local
