# =============================================================================
# 世界杯冠军预测 Agent — docker-compose.yml
# =============================================================================
# 启动:
#   docker-compose up -d              # 后台启动 (前后端)
#   docker-compose up -d streamlit    # 仅启动前端
#   docker-compose logs -f            # 查看日志
#   docker-compose down               # 停止并清理
# =============================================================================

version: "3.8"

services:
  streamlit:
    build: .
    container_name: wc-streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    environment:
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_HEADLESS=true
      - MONTE_CARLO_SIMULATIONS=5000
      - RANDOM_SEED=42
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backend:
    build: .
    container_name: wc-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  wc-data:
    driver: local
