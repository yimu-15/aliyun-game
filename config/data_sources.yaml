# =============================================================================
# 世界杯冠军预测 Agent — 真实数据源注册表
# =============================================================================
# 原则：
#   1. 所有数据源必须真实可获取，严禁使用编造的示例数据
#   2. 每个数据源均标注来源 URL，支持答辩中追溯说明
#   3. 如果某类数据暂时无法获取，明确标注缺失状态和替代方案
# =============================================================================

sources:

  # =========================================================================
  # 数据源 1: Kaggle — International Football Results (1872-2024)
  # 优先级: ★★★★★ (最高，MVP 核心数据源)
  # 真实性: 100% 真实历史比赛记录
  # =========================================================================
  - id: kaggle_intl_matches
    name: "International Football Results from 1872 to 2024"
    category: matches
    url: "https://www.kaggle.com/datasets/martj42/international-football-results-from-1872-to-2017"
    download_method: kaggle_api  # kagglehub 库下载
    dataset_path: "martj42/international-football-results-from-1872-to-2017"
    file_name: "results.csv"
    local_path: "data/raw/matches/kaggle_intl_matches.csv"
    update_frequency: once  # 历史数据集，一次下载即可
    fields:
      - date          # 比赛日期
      - home_team     # 主队名称
      - away_team     # 客队名称
      - home_score    # 主队进球
      - away_score    # 客队进球
      - tournament    # 赛事名称 (含 "FIFA World Cup")
      - city          # 比赛城市
      - country       # 比赛国家
      - neutral       # 是否中立场地
    notes: |
      包含 1872 年至今的 44,000+ 场国家队比赛记录，覆盖全部 22 届世界杯。
      这是本项目最重要的历史数据来源。
      通过 kagglehub 库可一键下载，无需手动操作 Kaggle 网页。
      注意：本数据集更新较慢，2022 世界杯数据可能不完整，
      需要与数据源 2 合并使用。

  # =========================================================================
  # 数据源 2: Kaggle — FIFA World Cup Dataset (1930-2022)
  # 优先级: ★★★★★
  # 真实性: 100% 真实世界杯官方数据
  # =========================================================================
  - id: kaggle_worldcup
    name: "FIFA World Cup Dataset"
    category: matches
    url: "https://www.kaggle.com/datasets/abecklas/fifa-world-cup"
    download_method: kaggle_api
    dataset_path: "abecklas/fifa-world-cup"
    files:
      - name: "WorldCups.csv"           # 历届世界杯汇总
        local_path: "data/raw/matches/kaggle_worldcup_summary.csv"
      - name: "WorldCupMatches.csv"      # 世界杯所有比赛
        local_path: "data/raw/matches/kaggle_worldcup_matches.csv"
      - name: "WorldCupPlayers.csv"      # 世界杯球员数据
        local_path: "data/raw/players/kaggle_worldcup_players.csv"
    update_frequency: once
    fields:
      WorldCups.csv:
        - Year, Country, Winner, Runners-Up, Third, Fourth
        - GoalsScored, QualifiedTeams, MatchesPlayed, Attendance
      WorldCupMatches.csv:
        - Year, Datetime, Stage, Stadium, City
        - Home Team Name, Home Team Goals
        - Away Team Name, Away Team Goals
        - Win conditions, Attendance, Referee
      WorldCupPlayers.csv:
        - RoundID, MatchID, Team, Coach Name
        - Player Name, Shirt Number, Position, Event
    notes: |
      官方世界杯数据集，涵盖全部 22 届世界杯的比赛、球员、汇总信息。
      是世界杯专用数据的最佳来源。
      与数据源 1 互补：数据源 1 范围广（所有国家队比赛），
      数据源 2 专精于世界杯。

  # =========================================================================
  # 数据源 3: Kaggle — FIFA World Rankings (1992-2024)
  # 优先级: ★★★★
  # 真实性: 100% 真实 FIFA 官方排名
  # =========================================================================
  - id: kaggle_fifa_rankings
    name: "FIFA World Ranking Dataset"
    category: rankings
    url: "https://www.kaggle.com/datasets/cashncarry/fifaworldranking"
    download_method: kaggle_api
    dataset_path: "cashncarry/fifaworldranking"
    file_name: "fifa_ranking-2024-12-19.csv"
    local_path: "data/raw/rankings/kaggle_fifa_rankings.csv"
    update_frequency: once  # 历史排名数据
    fields:
      - rank           # 排名
      - country_full   # 国家全名
      - country_abrv   # 国家缩写
      - total_points   # 总积分
      - previous_points # 上期积分
      - rank_change    # 排名变化
      - confederation  # 所属大洲足联
      - rank_date      # 排名日期
    notes: |
      FIFA 官方排名数据，1992 年至今的每月排名快照。
      用于构建球队实力特征。
      注意：需要按年份筛选出世界杯赛前的最新排名。

  # =========================================================================
  # 数据源 4: GitHub — openfootball/world-cup
  # 优先级: ★★★★
  # 真实性: 100% 真实开源足球数据
  # =========================================================================
  - id: openfootball_worldcup
    name: "openfootball/world-cup (GitHub)"
    category: tournaments
    url: "https://github.com/openfootball/world-cup"
    download_method: git_clone  # git clone 到本地
    repo_url: "https://github.com/openfootball/world-cup.git"
    local_path: "data/raw/tournaments/openfootball/"
    update_frequency: once
    fields:
      - 各届世界杯赛程、比分、小组积分
      - 格式: .txt (Football.TXT 标准)
    notes: |
      开源足球数据项目，包含所有世界杯的完整赛程和比分。
      格式为 Football.TXT，需自行解析。
      优势是数据完整、社区维护、可追溯。

  # =========================================================================
  # 数据源 5: FIFA 官网 / Wikipedia — 2026 世界杯赛程与分组
  # 优先级: ★★★
  # 真实性: 100% 真实官方赛制
  # 状态: 赛程细节尚未公布（2026 世界杯 2025 年底抽签）
  # =========================================================================
  - id: fifa_2026_schedule
    name: "FIFA World Cup 2026 Schedule & Groups"
    category: tournaments
    url_primary: "https://www.fifa.com/en/tournaments/mens/worldcup/canadamexicousa2026"
    url_fallback: "https://en.wikipedia.org/wiki/2026_FIFA_World_Cup"
    download_method: manual_config  # 手动从官方信息配置
    local_path: "data/raw/tournaments/wc2026_bracket.json"
    update_frequency: once  # 赛制公布后更新一次
    status: PARTIALLY_AVAILABLE
    available_info:
      - 赛制: 48 队, 16 组 × 3 队, 小组前 2 出线 → 32 强淘汰赛
      - 举办城市: 16 个城市（美国 11 + 墨西哥 3 + 加拿大 2）
      - 比赛日期: 2026-06-11 至 2026-07-19
    missing_info:
      - 具体分组抽签结果（预计 2025 年底公布）
      - 具体赛程对阵表
    fallback_plan: |
      MVP 阶段：根据 FIFA 排名和历史实力
      构造合理的 Mock 分组（标注为 "基于FIFA排名的预估分组"），
      在文档中明确说明这是预估数据，非官方分组。
      一旦官方公布分组，通过配置文件更新即可。

  # =========================================================================
  # 数据源 6: Transfermarkt — 球员身价数据
  # 优先级: ★★ (MVP 可选)
  # 真实性: 真实市场估价（最具权威的足球身价参考网站）
  # 状态: 需爬虫获取，无官方 API
  # =========================================================================
  - id: transfermarkt_players
    name: "Transfermarkt Player Market Values"
    category: players
    url: "https://www.transfermarkt.com/spieler-statistik/wertvollstespieler/marktwertetop"
    download_method: web_scraping
    local_path: "data/raw/players/transfermarkt_values.csv"
    update_frequency: weekly  # 身价每周更新
    status: MANUAL_ONLY_IN_MVP
    fields:
      - player_name, team, age, position
      - market_value, nationality
    notes: |
      Transfermarkt 是足球界最权威的球员身价参考网站。
      无官方 API，需使用 requests + BeautifulSoup 爬取。
      MVP 阶段：暂不接入爬虫（反爬复杂），
      允许手动下载 CSV 放入 data/raw/players/ 目录。
      后续迭代版本再实现自动化爬取。
    alternative: |
      如果爬虫方案不可行，替代方案：
      1. 使用 FIFA 游戏（EA FC）的球员评分数据（Kaggle 有公开数据集）
      2. 搜索 "FIFA player ratings" Kaggle 数据集
      3. 数据集名: "FIFA 23/24 Complete Player Dataset"
      4. URL: https://www.kaggle.com/datasets/stefanoleone992/fifa-23-complete-player-dataset

  # =========================================================================
  # 数据源 7: FIFA 游戏球员评分 (EA FC / FIFA 23/24)
  # 优先级: ★★★ (球员能力值的优秀替代方案)
  # 真实性: 基于 EA Sports 官方球探数据
  # =========================================================================
  - id: kaggle_fifa_players
    name: "FIFA 23 Complete Player Dataset"
    category: players
    url: "https://www.kaggle.com/datasets/stefanoleone992/fifa-23-complete-player-dataset"
    download_method: kaggle_api
    dataset_path: "stefanoleone992/fifa-23-complete-player-dataset"
    file_name: "players_23.csv"
    local_path: "data/raw/players/kaggle_fifa23_players.csv"
    update_frequency: once
    fields:
      - overall, potential, value_eur, wage_eur, age
      - nationality_name, club_name
      - pace, shooting, passing, dribbling, defending, physic
      - attacking_*, movement_*, power_*, mentality_*, defending_*
      - player_positions, preferred_foot, weak_foot, skill_moves
    notes: |
      虽然不是真实球员数据，但 EA 的球探网络覆盖全球，
      球员评分是业界公认的量化参考标准。
      用于构建球员级别的特征（各国家队球员平均能力值等）。

  # =========================================================================
  # 数据源 8: ELO Ratings — 国际足球 ELO 评分
  # 优先级: ★★★★
  # 真实性: 100% 真实（基于历史比赛结果计算）
  # =========================================================================
  - id: elo_ratings
    name: "World Football Elo Ratings"
    category: rankings
    url: "https://www.eloratings.net/"
    download_method: web_scraping_or_manual
    local_path: "data/raw/rankings/elo_ratings.csv"
    update_frequency: daily
    status: MANUAL_IN_MVP
    fields:
      - rank, team, rating, highest_rank, avg_rating
    notes: |
      ELO 评分体系比 FIFA 排名更准确反映球队实力，
      是足球预测领域广泛使用的指标。
      网站 eloratings.net 提供完整历史数据。
      MVP 阶段：手动导出 CSV 放入 data/raw/rankings/。

# =============================================================================
# 数据源获取优先级（MVP 阶段）
# =============================================================================
mvp_priority:
  - kaggle_intl_matches      # 历史比赛数据（必须）
  - kaggle_worldcup           # 世界杯专用数据（必须）
  - kaggle_fifa_rankings      # FIFA 排名（必须）
  - openfootball_worldcup     # 世界杯赛程（推荐）
  - elo_ratings               # ELO 评分（推荐，手动获取）
  - kaggle_fifa_players       # 球员评分（可选）
  - fifa_2026_schedule        # 2026 赛程（手动配置）
  - transfermarkt_players     # 球员身价（延迟到 v1.1）
